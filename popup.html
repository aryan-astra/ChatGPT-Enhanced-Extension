<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ChatGPT Enhanced</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="header">
    <div class="header-left">
      <img class="logo-icon" src="assets/chatgpt-enhanced-128_logo.png" alt="ChatGPT Enhanced" draggable="false">
      <span class="logo-text">ChatGPT Enhanced</span>
    </div>
    <span class="version" id="ext-version">v3.4.0</span>
  </div>

  <div class="section-label">Performance</div>
  <div class="toggle-row" data-key="lagFix">
    <span class="row-title">Typing Lag Fix</span>
    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
  </div>
  <div class="toggle-row" data-key="compactSidebar">
    <span class="row-title">Compact Sidebar</span>
    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
  </div>

  <div class="section-label">Productivity</div>
  <div class="toggle-row" data-key="bulkActions">
    <span class="row-title">Bulk Archive / Delete</span>
    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
  </div>
  <div class="toggle-row" data-key="dateGroups">
    <span class="row-title">Organize by Date</span>
    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
  </div>

  <div class="section-label">Tools</div>
  <div class="toggle-row" data-key="modelBadge">
    <span class="row-title">Model Badge</span>
    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
  </div>
  <div class="toggle-row" data-key="contextBar">
    <span class="row-title">Context % Bar</span>
    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
  </div>
  <div class="toggle-row" data-key="contextWarning">
    <span class="row-title">Context Limit Warning</span>
    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
  </div>

  <div class="section-label section-label--alpha">Experimental</div>
  <div class="toggle-row toggle-row--alpha" data-key="alphaMode">
    <div class="alpha-label-group">
      <span class="row-title">Enable Alpha Mode</span>
      <span class="alpha-badge">EXPERIMENTAL</span>
    </div>
    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
  </div>
  <div id="alpha-features" class="alpha-features">
    <div class="alpha-item">🔒 Hide Chats</div>
    <div class="alpha-item">🔐 Lock Chats</div>
    <div class="alpha-item">📤 Export Chats</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
